<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritika Travel - Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Ritika Travel</h1>
            <nav>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="destinations.html">Destinations</a>
                    <a href="packages.html">Packages</a>
                    <a href="gallery.html">Gallery</a>
                    <a href="about.html">About Us</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h2>Photo Gallery</h2>
            <p>Explore stunning images from our travels around the world.</p>
        </div>
    </section>

    <section class="gallery">
        <div class="container">
            <div class="gallery-grid">
                <img src="https://via.placeholder.com/400x300?text=Beach+Sunset" alt="Beach Sunset">
                <img src="https://via.placeholder.com/400x300?text=Mountain+View" alt="Mountain View">
                <img src="https://via.placeholder.com/400x300?text=City+Skyline" alt="City Skyline">
                <img src="https://via.placeholder.com/400x300?text=Forest+Trail" alt="Forest Trail">
                <img src="https://via.placeholder.com/400x300?text=Desert+Dunes" alt="Desert Dunes">
                <img src="https://via.placeholder.com/400x300?text=Ocean+Waves" alt="Ocean Waves">
                <img src="https://via.placeholder.com/400x300?text=Temple+Architecture" alt="Temple Architecture">
                <img src="https://via.placeholder.com/400x300?text=Wildlife+Safari" alt="Wildlife Safari">
                <img src="https://via.placeholder.com/400x300?text=Waterfall" alt="Waterfall">
                <img src="https://via.placeholder.com/400x300?text=Street+Market" alt="Street Market">
                <img src="https://via.placeholder.com/400x300?text=Snowy+Peak" alt="Snowy Peak">
                <img src="https://via.placeholder.com/400x300?text=Boat+Cruise" alt="Boat Cruise">
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ritika Travel | All Rights Reserved</p>
            <div class="social-links">
                <a href="#" class="social-link">Facebook</a>
                <a href="#" class="social-link">Instagram</a>
                <a href="#" class="social-link">Twitter</a>
            </div>
        </div>
    </footer>

    <!-- Chatbot Widget -->
    <div class="chatbot-wrapper" id="chatbot-wrapper">
        <button class="chatbot-toggle" id="chatbot-toggle" aria-label="Open chat support">
            <span class="chatbot-icon">✈</span>
        </button>
        <div class="chatbot-panel" id="chatbot-panel" aria-hidden="true">
            <div class="chatbot-header">
                <div class="chatbot-title">
                    <span class="chatbot-badge">Live Chat</span>
                    Travel Assistant
                </div>
                <button class="chatbot-close" id="chatbot-close" aria-label="Close chat window">&times;</button>
            </div>
            <div class="chatbot-body">
                <iframe src="https://www.chatbase.co/chatbot-iframe/8zx4d3Au9fwHzBY6VL8cE" title="Ritika Travel Chatbot" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
